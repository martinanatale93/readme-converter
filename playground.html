<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>readme-converter — Live Playground</title>
  <meta name="description" content="Paste any Markdown and instantly preview it as a beautiful documentation page." />
  <meta property="og:title" content="readme-converter — Live Playground" />
  <meta property="og:description" content="Paste any Markdown and instantly preview it as a beautiful documentation page." />

  <!-- Marked (markdown parser) -->
  <script src="https://cdn.jsdelivr.net/npm/marked@14/marked.min.js"></script>
  <!-- highlight.js -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github.min.css" id="hljs-light" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github-dark.min.css" id="hljs-dark" disabled />
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>

  <style>
    /* ── Variables ── */
    :root, [data-theme="light"] {
      --rc-accent: #2563eb;
      --rc-bg: #ffffff;
      --rc-bg-secondary: #f6f8fa;
      --rc-text: #1f2328;
      --rc-text-muted: #656d76;
      --rc-border: #d0d7de;
      --rc-code-bg: #f0f2f5;
      --rc-shadow: 0 1px 3px rgba(0,0,0,0.06);
    }
    [data-theme="dark"] {
      --rc-bg: #0d1117;
      --rc-bg-secondary: #161b22;
      --rc-text: #e6edf3;
      --rc-text-muted: #8b949e;
      --rc-border: #30363d;
      --rc-code-bg: #1c2129;
      --rc-shadow: 0 1px 3px rgba(0,0,0,0.3);
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-font-smoothing: antialiased; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      line-height: 1.6;
      color: var(--rc-text);
      background: var(--rc-bg);
      transition: background 0.2s, color 0.2s;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.5rem;
      background: var(--rc-bg-secondary);
      border-bottom: 1px solid var(--rc-border);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .topbar-left { display: flex; align-items: center; gap: 1rem; }
    .topbar h1 {
      font-size: 1.1rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--rc-text) 0%, var(--rc-accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .topbar-links { display: flex; gap: 1rem; align-items: center; }
    .topbar-links a {
      color: var(--rc-text-muted);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      transition: color 0.15s;
    }
    .topbar-links a:hover { color: var(--rc-accent); }
    .btn-sm {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.35rem 0.75rem;
      font-size: 0.8rem;
      font-weight: 600;
      border-radius: 6px;
      border: 1px solid var(--rc-border);
      background: var(--rc-bg);
      color: var(--rc-text);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      text-decoration: none;
    }
    .btn-sm:hover { border-color: var(--rc-accent); color: var(--rc-accent); }
    .btn-primary {
      background: var(--rc-accent);
      color: #fff;
      border-color: var(--rc-accent);
    }
    .btn-primary:hover { opacity: 0.9; color: #fff; }

    /* ── Theme toggle ── */
    .theme-toggle {
      background: var(--rc-bg);
      border: 1px solid var(--rc-border);
      border-radius: 50%;
      width: 34px;
      height: 34px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      transition: transform 0.2s;
    }
    .theme-toggle:hover { transform: scale(1.1); }

    /* ── Split layout ── */
    .playground {
      display: flex;
      height: calc(100vh - 49px);
    }
    .pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .pane-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 1rem;
      background: var(--rc-bg-secondary);
      border-bottom: 1px solid var(--rc-border);
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--rc-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .pane-header .tag {
      font-size: 0.7rem;
      padding: 0.15rem 0.4rem;
      background: var(--rc-code-bg);
      border-radius: 4px;
      font-weight: 500;
      text-transform: none;
      letter-spacing: 0;
    }
    .divider {
      width: 4px;
      background: var(--rc-border);
      cursor: col-resize;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .divider:hover, .divider.active { background: var(--rc-accent); }

    /* ── Editor ── */
    #editor {
      flex: 1;
      width: 100%;
      resize: none;
      border: none;
      outline: none;
      padding: 1.25rem;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 0.875rem;
      line-height: 1.65;
      background: var(--rc-bg);
      color: var(--rc-text);
      tab-size: 2;
    }

    /* ── Preview ── */
    #preview {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 2rem;
      background: var(--rc-bg);
    }

    /* ── Rendered markdown styles (inside preview) ── */
    #preview h1, #preview h2, #preview h3, #preview h4, #preview h5, #preview h6 {
      margin-top: 1.75rem;
      margin-bottom: 0.5rem;
      font-weight: 600;
      line-height: 1.3;
      color: var(--rc-text);
    }
    #preview h1 { font-size: 2rem; border-bottom: 1px solid var(--rc-border); padding-bottom: 0.4rem; }
    #preview h2 { font-size: 1.5rem; border-bottom: 1px solid var(--rc-border); padding-bottom: 0.3rem; }
    #preview h3 { font-size: 1.25rem; }
    #preview p { margin-bottom: 1rem; }
    #preview a { color: var(--rc-accent); }
    #preview a:hover { text-decoration: underline; }
    #preview ul, #preview ol { margin-bottom: 1rem; padding-left: 2em; }
    #preview li + li { margin-top: 0.25rem; }
    #preview code {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 0.875em;
      background: var(--rc-code-bg);
      padding: 0.15em 0.4em;
      border-radius: 4px;
    }
    #preview pre {
      background: var(--rc-code-bg);
      border: 1px solid var(--rc-border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      overflow-x: auto;
      margin-bottom: 1rem;
      box-shadow: var(--rc-shadow);
    }
    #preview pre code { background: none; padding: 0; font-size: 0.85rem; line-height: 1.6; }
    #preview blockquote {
      border-left: 4px solid var(--rc-accent);
      padding: 0.5rem 1rem;
      margin-bottom: 1rem;
      color: var(--rc-text-muted);
      background: var(--rc-bg-secondary);
      border-radius: 0 6px 6px 0;
    }
    #preview table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; }
    #preview th, #preview td { border: 1px solid var(--rc-border); padding: 0.5rem 0.75rem; text-align: left; }
    #preview th { background: var(--rc-bg-secondary); font-weight: 600; }
    #preview img { max-width: 100%; height: auto; border-radius: 6px; }
    #preview hr { border: none; border-top: 1px solid var(--rc-border); margin: 2rem 0; }
    #preview strong { font-weight: 600; }

    /* ── Empty state ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--rc-text-muted);
      text-align: center;
      gap: 0.75rem;
    }
    .empty-state .icon { font-size: 3rem; opacity: 0.4; }
    .empty-state p { font-size: 0.95rem; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .playground { flex-direction: column; }
      .pane { min-height: 40vh; }
      .divider { width: auto; height: 4px; cursor: row-resize; }
      .topbar-links a.hide-mobile { display: none; }
    }
  </style>
</head>
<body>
  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-left">
      <h1>readme-converter</h1>
      <span style="color: var(--rc-text-muted); font-size: 0.8rem;">Playground</span>
    </div>
    <div class="topbar-links">
      <a href="index.html" class="hide-mobile">← Demo Page</a>
      <a href="https://github.com/martinanatale93/readme-converter" target="_blank" rel="noopener">GitHub</a>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">🌓</button>
    </div>
  </div>

  <!-- Split panes -->
  <div class="playground">
    <!-- Editor pane -->
    <div class="pane">
      <div class="pane-header">
        <span>Markdown</span>
        <span class="tag">Paste or type</span>
      </div>
      <textarea id="editor" spellcheck="false" placeholder="# Hello World

Paste your README here and see it rendered instantly..."></textarea>
    </div>

    <!-- Draggable divider -->
    <div class="divider" id="divider"></div>

    <!-- Preview pane -->
    <div class="pane">
      <div class="pane-header">
        <span>Preview</span>
        <button class="btn-sm" id="copyHtmlBtn">Copy HTML</button>
      </div>
      <div id="preview">
        <div class="empty-state">
          <div class="icon">📝</div>
          <p>Start typing or paste Markdown on the left<br />to see a live preview here.</p>
        </div>
      </div>
    </div>
  </div>

  <script>
  (function () {
    /* ── Theme ── */
    var STORAGE_KEY = 'readme-converter-theme';
    var toggle = document.getElementById('themeToggle');
    var root = document.documentElement;
    var hljsLight = document.getElementById('hljs-light');
    var hljsDark = document.getElementById('hljs-dark');

    function applyTheme(theme) {
      root.setAttribute('data-theme', theme);
      localStorage.setItem(STORAGE_KEY, theme);
      hljsLight.disabled = theme === 'dark';
      hljsDark.disabled = theme !== 'dark';
    }

    var saved = localStorage.getItem(STORAGE_KEY);
    if (saved) applyTheme(saved);
    else if (window.matchMedia('(prefers-color-scheme: dark)').matches) applyTheme('dark');

    toggle.addEventListener('click', function () {
      applyTheme(root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });

    /* ── Marked config ── */
    marked.setOptions({
      gfm: true,
      breaks: false,
      highlight: function (code, lang) {
        if (lang && hljs.getLanguage(lang)) {
          return hljs.highlight(code, { language: lang }).value;
        }
        return hljs.highlightAuto(code).value;
      }
    });

    /* ── Live preview ── */
    var editor = document.getElementById('editor');
    var preview = document.getElementById('preview');
    var debounceTimer;

    function renderPreview() {
      var md = editor.value.trim();
      if (!md) {
        preview.innerHTML =
          '<div class="empty-state">' +
          '<div class="icon">📝</div>' +
          '<p>Start typing or paste Markdown on the left<br />to see a live preview here.</p>' +
          '</div>';
        return;
      }
      preview.innerHTML = marked.parse(md);
      preview.querySelectorAll('pre code').forEach(function (block) {
        hljs.highlightElement(block);
      });
    }

    editor.addEventListener('input', function () {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(renderPreview, 150);
    });

    /* ── Copy HTML button ── */
    document.getElementById('copyHtmlBtn').addEventListener('click', function () {
      var btn = this;
      var html = preview.innerHTML;
      navigator.clipboard.writeText(html).then(function () {
        btn.textContent = 'Copied!';
        setTimeout(function () { btn.textContent = 'Copy HTML'; }, 2000);
      });
    });

    /* ── Draggable divider ── */
    var divider = document.getElementById('divider');
    var playground = document.querySelector('.playground');
    var panes = playground.querySelectorAll('.pane');
    var isDragging = false;

    divider.addEventListener('mousedown', function (e) {
      isDragging = true;
      divider.classList.add('active');
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
      e.preventDefault();
    });

    document.addEventListener('mousemove', function (e) {
      if (!isDragging) return;
      var rect = playground.getBoundingClientRect();
      var offset = e.clientX - rect.left;
      var total = rect.width - 4; // divider width
      var pct = Math.min(Math.max(offset / total * 100, 20), 80);
      panes[0].style.flex = 'none';
      panes[0].style.width = pct + '%';
      panes[1].style.flex = '1';
    });

    document.addEventListener('mouseup', function () {
      if (!isDragging) return;
      isDragging = false;
      divider.classList.remove('active');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    });

    /* ── Load sample content ── */
    var sample = [
      '# My Awesome Project',
      '',
      'A brief description of what this project does and who it\'s for.',
      '',
      '## Installation',
      '',
      '```bash',
      'npm install my-awesome-project',
      '```',
      '',
      '## Usage',
      '',
      '```javascript',
      'import { awesomeFunction } from \'my-awesome-project\';',
      '',
      'const result = awesomeFunction({',
      '  option: true,',
      '  name: \'world\'',
      '});',
      '',
      'console.log(result);',
      '```',
      '',
      '## Features',
      '',
      '- **Fast** — optimised for speed',
      '- **Simple** — zero configuration needed',
      '- **Flexible** — works with any project',
      '',
      '## API',
      '',
      '| Method | Description | Returns |',
      '|--------|-------------|---------|',
      '| `awesomeFunction(opts)` | Does something awesome | `string` |',
      '| `configure(config)` | Set global config | `void` |',
      '',
      '> **Note:** This is a sample README. Paste your own Markdown to try it out!',
      '',
      '## License',
      '',
      'MIT'
    ].join('\n');

    editor.value = sample;
    renderPreview();
  })();
  </script>
</body>
</html>
